<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シッタカブッター - admin/users</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080c08;
      color: #a0c8a0;
      font-family: 'Courier New', 'Osaka-Mono', monospace;
      min-height: 100vh;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid #1a2e1a;
      padding-bottom: 14px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand-en {
      font-size: 14px;
      color: #4caf50;
      letter-spacing: 0.1em;
    }
    .brand-en::before { content: '> '; color: #2d5a2d; }

    .brand-ja {
      font-size: 11px;
      color: #5a8a5a;
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      padding-left: 16px;
    }

    .header h1 {
      font-size: 16px;
      color: #4caf50;
      font-weight: normal;
      letter-spacing: 0.1em;
    }
    .header h1::before { content: '> '; color: #2d5a2d; }

    .logout-btn {
      font-size: 11px;
      color: #2d5a2d;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .logout-btn:hover { color: #4caf50; }

    .table-label {
      font-size: 11px;
      color: #4caf50;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .table-label::before { content: '// '; }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      border-bottom: 1px solid #2d5a2d;
    }

    th {
      text-align: left;
      padding: 10px 14px;
      font-weight: normal;
      color: #4caf50;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    th::before { content: '# '; color: #2d5a2d; font-size: 10px; }

    td {
      padding: 12px 14px;
      color: #7aaa7a;
      border-bottom: 1px solid #0f150f;
      white-space: nowrap;
    }

    tr:hover td { background: #0a0f0a; }

    .id-cell { color: #3a5a3a; font-size: 12px; }
    .date-cell { color: #3a5a3a; font-size: 11px; }

    .count {
      margin-top: 16px;
      font-size: 11px;
      color: #2d5a2d;
    }
    .count::before { content: '> '; }
  </style>
</head>
<body>

  <div class="header">
    <div class="brand">
      <div class="brand-en">shittakabutter</div>
      <div class="brand-ja">シッタカブッター</div>
    </div>
    <button class="logout-btn">logout</button>
  </div>

  <div class="table-label">ユーザー一覧</div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>名前</th>
          <th>メールアドレス</th>
          <th>登録日時</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="id-cell">1</td>
          <td>山田 太郎</td>
          <td>yamada@example.com</td>
          <td class="date-cell">2026-05-20 10:12:34</td>
        </tr>
        <tr>
          <td class="id-cell">2</td>
          <td>鈴木 花子</td>
          <td>suzuki@example.com</td>
          <td class="date-cell">2026-05-21 14:33:02</td>
        </tr>
        <tr>
          <td class="id-cell">3</td>
          <td>田中 一郎</td>
          <td>tanaka@example.com</td>
          <td class="date-cell">2026-05-22 09:05:51</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="count">3 users found.</div>

</body>
</html>
